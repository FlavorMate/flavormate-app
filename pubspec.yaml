name: flavormate
description: "A self hosted cookbook"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 4.0.1+93

environment:
  sdk: '>=3.11.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  app_links: ^7.0.0
  crypto: ^3.0.7
  collection: ^1.19.1
  dart_mappable: ^4.6.1
  device_info_plus: ^12.3.0
  dio: ^5.9.2
  fl_chart: ^1.1.1
  flex_seed_scheme: ^4.0.1
  flutter_expandable_fab: ^2.5.2
  flutter_m3shapes: ^1.0.0+2
  flutter_markdown_plus: ^1.0.7
  flutter_material_design_icons: ^1.1.7447
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.2.3
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  http: ^1.6.0
  image_picker: ^1.2.1
  intl: ^0.20.2
  jwt_decoder: ^2.0.1
  package_info_plus: ^9.0.0
  path: ^1.9.1
  path_provider: ^2.1.5
  photo_view: ^0.15.0
  riverpod_annotation: ^4.0.2
  sembast: ^3.8.6
  shared_preferences: ^2.5.4
  share_plus: ^12.0.1
  system_theme: ^3.2.0
  two_dimensional_scrollables: ^0.3.8
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  vector_graphics: ^1.1.19
  # no strict version because these depend on the SDK version:
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.11.1
  dart_mappable_builder: ^4.6.4
  flutter_gen_runner: ^5.12.0
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3

flutter_gen:
  output: lib/generated/flutter_gen
  integrations:
    image: true
    flutter_svg: true

# The following section is specific to Flutter packages.
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/logo_dynamic.svg
    - assets/icons/bring.png
    - assets/web/backend_url.txt
    # Settings / Full Image
    - assets/images/settings/image_mode/16_9.webp
    - assets/images/settings/image_mode/original.webp
    # App Icons
    - assets/app-icons/flavormate.png
    - assets/app-icons/winter_2025.png
    # Licenses
    - assets/fonts/Google_Sans_Code/OFL.txt
    - assets/fonts/Google_Sans_Flex/OFL.txt
    - LICENSE.txt
  
  fonts:
    - family: GoogleSansFlex
      fonts:
        - asset: assets/fonts/Google_Sans_Flex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf
    - family: monospace
      fonts:
        - asset: assets/fonts/Google_Sans_Code/GoogleSansCode-VariableFont_wght.ttf
